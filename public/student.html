<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student OPAC — Sulong Dunong</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOPBAR: User session info and logout button -->
<div class="topbar">
    <div class="topbar-brand">
        <img src="logo.png" alt="Logo" class="topbar-logo">
        <div>
            <h1>SULONG DUNONG</h1>
            <span id="portalLabel">Library Portal</span>
        </div>
    </div>
    <div class="topbar-right">
        <p class="topbar-user" id="userDisplay"></p>
        <!-- Note: Logout clears session and returns to login page -->
        <button id="logoutBtn">Log Out</button>
    </div>
</div>

<!-- BOOKS TABLE: Simple searchable book inventory (no pagination/sorting) -->
<div class="box">
    <h2>Available Books</h2>
    <!-- Note: Live search filters books as user types -->
    <input id="searchInput" placeholder="Search by title, author, category, dewey decimal…">
    <table id="bookTable">
        <thead>
            <tr>
                <th>ID</th><th>Title</th><th>Author</th><th>Year</th><th>Category</th><th>Dewey Decimal</th><th>Status</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<!-- BORROW/RETURN SECTION: Book borrowing and return operations -->
<div class="box">
    <h2>Borrow / Return</h2>
    <!-- Note: Select a book row first, then click borrow/return buttons -->
    <button onclick="borrowBook()">Borrow Selected</button>
    <button onclick="showReturnPanel()">Return Selected</button>

    <!-- Return panel for date selection -->
    <div id="returnPanel" style="display:none; margin-top:16px; padding-top:16px; border-top:1px solid #f2f2f2;">
        <p style="font-size:13px; color:#555; margin:0 0 10px 0;">
            Enter the date you are returning <strong id="returningBookCode"></strong>:
        </p>
        <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
            <input type="date" id="returnDateInput" style="width:auto;">
            <button onclick="confirmReturn()">Confirm Return</button>
            <button onclick="cancelReturn()" style="background:transparent; color:#999; border:1.5px solid #ddd;">Cancel</button>
        </div>
        <p id="returnMessage" style="font-size:13px; margin:10px 0 0 0;"></p>
    </div>
</div>

<!-- FEES SECTION: Overdue fees table (shown only if user has fees) -->
<div class="box" id="feesSection" style="display:none;">
    <h2>Overdue Fees</h2>
    <table>
        <thead>
            <tr>
                <th>Book ID</th>
                <th>Due Date</th>
                <th>Return Date</th>
                <th>Days Overdue</th>
                <th>Fee</th>
            </tr>
        </thead>
        <tbody id="feeList"></tbody>
    </table>
</div>

<script src="app.js"></script>
<script>
    // Note: Page initialization - verify user is logged in and has valid role
    const storedUser = sessionStorage.getItem("currentUser");
    if (!storedUser) { 
        alert("Please login"); 
        window.location.href = "index.html"; 
    }
    currentUser = JSON.parse(storedUser);
    if (currentUser.role !== "student" && currentUser.role !== "teacher") { 
        alert("Access denied");
        window.location.href = "index.html"; 
    }

    // Note: Set portal label and display current logged-in user in topbar
    document.getElementById("portalLabel").textContent =
        currentUser.role === "teacher" ? "Teacher Library Portal" : "Student Library Portal";
    document.getElementById("userDisplay").innerHTML =
        `Logged in as <strong>${currentUser.name}</strong>`;
    document.getElementById("logoutBtn").addEventListener("click", logout);

    // Note: Load books from /api/books endpoint - uses client-side filtering
    loadBooks();

    // Note: Live search - filters table as user types (client-side, case-insensitive)
    document.getElementById("searchInput").addEventListener("input", () => {
        const query = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll("#bookTable tbody tr").forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(query) ? "" : "none";
        });
    });
</script>
</body>
</html>
